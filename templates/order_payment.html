{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Flower Shop — оплата</title>
	<link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
	<header id="header">
		<div class="container">
			<div class="header ficb">
				<a href="/"><img src="{% static 'img/logo.svg' %}" alt="logo" class="logo"></a>
			</div>
		</div>
	</header>
	<section id="order">
		<div class="container">
			<div class="order">
				<div class="order__block">
					<div class="order_items">
						<div class="title">Оплата заказа №{{ order.pk }}</div>
						<p>Букет: {{ order.bouquet.title }}</p>
						<p>Получатель: {{ order.customer_name }}</p>
						<p>Адрес: {{ order.address }}</p>
						<p>Время доставки: {{ order.get_delivery_time_display }}</p>
						<p><strong>К оплате: {{ order.bouquet.price }} ₽</strong></p>

						<form method="POST" action="https://yoomoney.ru/quickpay/confirm.xml">
							<input type="hidden" name="receiver" value="{{ receiver }}">
							<input type="hidden" name="quickpay-form" value="shop">
							<input type="hidden" name="targets" value="Заказ №{{ order.pk }} ({{ order.bouquet.title }})">
							<input type="hidden" name="paymentType" value="AC">
							<input type="hidden" name="sum" value="{{ order.bouquet.price }}" data-type="number">
							<input type="hidden" name="successURL" value="{{ success_url }}">
							<input type="hidden" name="label" value="order_{{ order.pk }}">
							<button type="submit" class="btn order__form_pay">Оплатить через ЮMoney</button>
						</form>
					</div>
				</div>
			</div>
		</div>
	</section>
</body>
</html>
